{% unless page.hide_academy_popup %}
<div id="academy-slide-popup" style="position:fixed;bottom:-160px;left:50%;transform:translateX(-50%);z-index:800;width:100%;max-width:680px;background:var(--char);border-top:2px solid var(--gold);padding:1.5rem 2rem;display:flex;align-items:center;gap:2rem;box-shadow:0 -8px 40px rgba(0,0,0,0.35);transition:bottom 0.5s cubic-bezier(0.34,1.56,0.64,1);">
  <div style="width:48px;height:48px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Playfair Display',serif;font-size:0.75rem;color:var(--char);font-weight:600;">MC</div>
  <div style="flex:1;">
    <div style="font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:0.3rem;">Now Open · Mastercraft</div>
    <div style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;color:var(--cream);margin-bottom:0.2rem;">Music &amp; Theatre Academy</div>
    <div style="font-size:0.8rem;color:rgba(244,244,240,0.5);">Monthly membership · All experience levels welcome</div>
  </div>
  <a href="/academy/" style="font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--char);background:var(--gold);padding:0.7rem 1.5rem;text-decoration:none;white-space:nowrap;flex-shrink:0;">Learn More</a>
  <button onclick="dismissAcademyPopup()" style="background:none;border:none;color:rgba(244,244,240,0.3);cursor:pointer;font-size:0.9rem;padding:0.3rem;flex-shrink:0;line-height:1;" aria-label="Dismiss">✕</button>
</div>
<style>
@media(max-width:767px){
  #academy-slide-popup { max-width:calc(100% - 2rem) !important; flex-wrap:wrap; gap:1rem; padding:1.2rem 1.5rem !important; }
  #academy-slide-popup > div:first-child { display:none; }
  #academy-slide-popup a { width:100%; text-align:center; }
}
</style>
<script>
(function(){
  if(sessionStorage.getItem('academyPopupDismissed')) return;
  setTimeout(function(){
    var p = document.getElementById('academy-slide-popup');
    if(p) p.style.bottom = '2rem';
  }, 4000);
})();
function dismissAcademyPopup(){
  var p = document.getElementById('academy-slide-popup');
  if(p){ p.style.bottom = '-200px'; setTimeout(function(){ p.style.display='none'; }, 500); }
  sessionStorage.setItem('academyPopupDismissed','1');
}
</script>
{% endunless %}
